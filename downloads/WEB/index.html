<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>imouPlayer</title>
  <script type="module" src="./imou-player.js"></script>
  <link rel="stylesheet" href="./imou-player.css">
  <script defer src="./index.js"></script>
</head>
<style>
  /* 全局隐藏滚动条 */
  html, body {
    scrollbar-width: none; /* Firefox */
    -ms-overflow-style: none; /* IE and Edge */
  }
  
  html::-webkit-scrollbar,
  body::-webkit-scrollbar,
  *::-webkit-scrollbar {
    display: none; /* Chrome, Safari and Opera */
  }
  
  * {
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  
  *::-webkit-scrollbar {
    display: none;
  }
  
  body{
    margin: 0;
    padding: 8px;
  }
  #playerForm {
    margin-bottom: 20px;
    display: flex;
    width: 800px;
    flex-wrap: wrap;
  }

  #playerForm>div {
    width: 800px;
    height: 20px;
    display: flex;
    margin-bottom: 5px;
    font-size: 16px;
    line-height: 1;
  }

  #playerForm>div>span {
    width: 300px;
    font-size: 16px;
    line-height: 1;
  }

  #playerForm>div>input {
    display: block;
    width: 300px;
    font-size: 16px;
    line-height: 1;
    height: 20px;
    transform: translateZ(0);
    outline: none;
  }

  #start {
    float: left;
  }

  .inputLabel {
    display: inline-block;
    min-width: 300px;
  }

  .inputSpan {
    display: inline-block;
    margin-left: -40px;
  }
</style>
<body>
  <form id="playerForm">
    <div>
      <span>deviceId</span>
      <input id="deviceId" placeholder="deviceId" value="" name="deviceId" />
    </div>
    <div>
      <span>kitToken</span>
      <input id="kitToken" placeholder="kitToken" value="" name="kitToken" />
    </div>
    <div>
      <span>channelId</span>
      <input id="channelId" placeholder="channelId" value="0" name="channelId" />
    </div>

    <div>
      <span class="inputLabel" name="streamId">清晰度</span>
      <span style="display:inline-block;height:100%;line-height:100%;">
        <input id="streamId0" value="0" name="streamId" type="radio" checked />
        <label for="streamId0">高清</label>
      </span>
      <span class="inputSpan">
        <input id="streamId1" value="1" name="streamId" type="radio" />
        <label for="streamId1">标清</label>
      </span>
    </div>
    <div>
      <span class="inputLabel" name="type">播放类型</span>
      <span style="display:inline-block;height:100%;line-height:100%;">
        <input id="type1" value="1" name="type" type="radio" checked />
        <label for="type1">直播</label>
      </span>
      <span class="inputSpan">
        <input id="type2" value="2" name="type" type="radio" />
        <label for="type2">录播</label>
      </span>
    </div>
    <div>
      <span class="inputLabel">录播类型</span>
      <span>
        <input id="recordType0" value="cloud" name="recordType" type="radio" checked />
        <label for="recordType0">云录像</label>
      </span>
      <span class="inputSpan">
        <input id="recordType1" value="localRecord" name="recordType" type="radio" />
        <label for="recordType1">本地录像</label>
      </span>
    </div>
    <div style="margin-bottom: 20px;">
      <span>加密秘钥</span>
      <input id="code" placeholder="" value="" name="code" />
    </div>
    <button id="start" >开始播放</button>
    <button id="new" style="margin-left:20px;">新增分屏播放</button>
    <button id="fullPage" style="margin-left:20px;">全屏</button>

    <button id="answerCall" style="margin-left:20px;">模拟设备发起对讲</button>
  </form>
  <div id="inputs">

  </div>
  <div id="root" style="display:grid;width:1800px;flex-flow:row wrap;height:900px"></div>
</body>

</html>
